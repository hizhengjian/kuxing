# 写文档场景示例
# 为项目生成完整的技术文档，分多轮执行

project_name: "RK3568 Driver Documentation"
project_path: "/home/zhengjian/rockchip/kernel/drivers/media"
description: "为RK3568平台摄像头驱动编写完整的技术文档"

mode: serial  # 串行执行，按顺序完成任务

tasks:
  - id: task_analyze
    type: agent
    description: "分析驱动代码结构"
    prompt_template: |
      请分析 {project_path} 目录下的摄像头驱动代码结构，
      识别：
      1. 主要模块和它们的功能
      2. 核心数据结构和API接口
      3. 驱动初始化的主要流程

      输出一个结构化的分析报告。
    expected_output: "生成 docs/analysis.md，包含代码结构分析"

  - id: task_outline
    type: agent
    description: "生成文档大纲"
    depends_on: [task_analyze]
    prompt_template: |
      根据 docs/analysis.md 的分析结果，
      创建一个详细的文档大纲，
      包含：
      1. 文档章节结构
      2. 每个章节的主要内容要点
      3. 需要包含的API参考

      输出文档大纲到 docs/OUTLINE.md
    expected_output: "生成 docs/OUTLINE.md，文档大纲"

  - id: task_api_doc
    type: agent
    description: "编写API参考文档"
    depends_on: [task_outline]
    prompt_template: |
      根据 docs/OUTLINE.md 的大纲，
      详细编写每个公开API接口的参考文档，
      包含：
      1. 函数原型和参数说明
      2. 返回值和错误码
      3. 使用示例代码

      输出到 docs/api_reference.md
    expected_output: "生成 docs/api_reference.md，完整的API参考"

  - id: task_diagram
    type: agent
    description: "生成架构图和流程图"
    depends_on: [task_outline]
    prompt_template: |
      根据 docs/analysis.md 和 docs/OUTLINE.md，
      为驱动架构和关键流程生成PlantUML图表：
      1. 系统架构图
      2. 初始化流程图
      3. 数据流序列图

      保存 .puml 文件到 docs/images/
      然后渲染生成 .svg 文件
    expected_output: "生成 docs/images/*.puml 和 *.svg"

  - id: task_quickstart
    type: agent
    description: "编写快速开始指南"
    depends_on: [task_api_doc]
    prompt_template: |
      基于已完成的API文档，
      编写一个快速开始指南，
      包含：
      1. 环境准备和依赖
      2. 基础配置步骤
      3. 第一个示例程序

      输出到 docs/QUICKSTART.md
    expected_output: "生成 docs/QUICKSTART.md，快速开始指南"